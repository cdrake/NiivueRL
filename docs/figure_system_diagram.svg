<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <!-- Grid pattern for brain volume -->
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#cbd5e1" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="#fafbfc" rx="8"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">Landmark Navigation as a Markov Decision Process</text>

  <!-- ====== BRAIN VOLUME (left) ====== -->
  <g transform="translate(40, 60)">
    <!-- 3D volume box - back faces -->
    <polygon points="60,20 280,20 280,240 60,240" fill="#e8eef6" stroke="#94a3b8" stroke-width="1.2"/>
    <!-- Top face -->
    <polygon points="60,20 100,0 320,0 280,20" fill="#dbe4f0" stroke="#94a3b8" stroke-width="1.2"/>
    <!-- Right face -->
    <polygon points="280,20 320,0 320,220 280,240" fill="#d0daea" stroke="#94a3b8" stroke-width="1.2"/>
    <!-- Grid overlay on front face -->
    <rect x="60" y="20" width="220" height="220" fill="url(#grid)" opacity="0.6"/>

    <!-- Axial slice hint -->
    <rect x="80" y="80" width="180" height="120" rx="4" fill="#1e293b" opacity="0.08"/>
    <text x="170" y="150" text-anchor="middle" font-size="13" fill="#64748b" font-style="italic">256 x 256 x 256</text>
    <text x="170" y="168" text-anchor="middle" font-size="13" fill="#64748b" font-style="italic">MNI152 T1 Brain</text>

    <!-- Target landmark (star) -->
    <circle cx="210" cy="110" r="10" fill="#dc2626" opacity="0.25" stroke="#dc2626" stroke-width="1.5"/>
    <text x="210" y="114" text-anchor="middle" font-size="14" fill="#dc2626" font-weight="bold">&#x2605;</text>
    <text x="240" y="100" font-size="11" fill="#dc2626" font-weight="600">Target</text>
    <text x="240" y="113" font-size="10" fill="#dc2626">(e.g., Hippocampus)</text>

    <!-- Agent position (dot) -->
    <circle cx="120" cy="190" r="6" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
    <text x="134" y="194" font-size="11" fill="#2563eb" font-weight="600">Agent</text>

    <!-- Dotted path from agent toward target -->
    <path d="M124,185 L140,170 L160,155 L175,140 L190,125 L203,115" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow-blue)"/>

    <!-- 7x7x7 neighborhood box around agent -->
    <rect x="98" y="168" width="44" height="44" rx="2" fill="#2563eb" opacity="0.1" stroke="#2563eb" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="120" y="226" text-anchor="middle" font-size="9" fill="#2563eb">7x7x7</text>

    <!-- Label -->
    <text x="170" y="270" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">3D Brain Volume (Environment)</text>
  </g>

  <!-- ====== MDP LOOP (right) ====== -->
  <g transform="translate(460, 65)">

    <!-- State box -->
    <rect x="60" y="0" width="300" height="80" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="210" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">State  s_t</text>
    <text x="210" y="44" text-anchor="middle" font-size="11" fill="#475569">7x7x7 voxel neighborhood (343 values)</text>
    <text x="210" y="60" text-anchor="middle" font-size="11" fill="#475569">+ direction to target (3 values)</text>
    <text x="210" y="74" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">346-dimensional vector</text>

    <!-- Agent / Policy box -->
    <rect x="80" y="120" width="260" height="80" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="210" y="145" text-anchor="middle" font-size="13" font-weight="bold" fill="#854d0e">RL Agent (DQN / A2C / PPO)</text>
    <line x1="100" y1="155" x2="320" y2="155" stroke="#e5e7eb" stroke-width="0.8"/>
    <text x="210" y="172" text-anchor="middle" font-size="11" fill="#475569">Q-Network or Actor-Critic</text>
    <text x="210" y="188" text-anchor="middle" font-size="11" fill="#475569">selects action a_t</text>

    <!-- Action box -->
    <rect x="100" y="240" width="220" height="68" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
    <text x="210" y="263" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">Action  a_t</text>
    <text x="210" y="282" text-anchor="middle" font-size="11" fill="#475569">Move &#x00B1;1 voxel along X, Y, or Z</text>
    <text x="210" y="298" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">6 discrete actions</text>

    <!-- Reward box -->
    <rect x="80" y="345" width="260" height="75" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="210" y="368" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b">Reward  r_t</text>
    <text x="210" y="388" text-anchor="middle" font-size="11" fill="#475569">-&#x0394;distance - 0.1 (step penalty)</text>
    <text x="210" y="405" text-anchor="middle" font-size="11" fill="#475569">+10 bonus if within 3 voxels</text>

    <!-- Arrows: state -> agent -->
    <line x1="210" y1="80" x2="210" y2="118" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

    <!-- Arrow: agent -> action -->
    <line x1="210" y1="200" x2="210" y2="238" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrow-green)"/>

    <!-- Arrow: action -> reward (and next state) -->
    <line x1="210" y1="308" x2="210" y2="343" stroke="#dc2626" stroke-width="1.8" marker-end="url(#arrow-red)"/>

    <!-- Loop-back arrow: reward -> state (next timestep) -->
    <path d="M80,385 L30,385 L30,40 L58,40" stroke="#444" stroke-width="1.8" fill="none" marker-end="url(#arrow)" stroke-linejoin="round"/>
    <text x="18" y="220" text-anchor="middle" font-size="11" fill="#64748b" transform="rotate(-90, 18, 220)">next timestep</text>

  </g>

  <!-- Arrow from brain volume to state box -->
  <path d="M380,160 L510,110" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow)"/>
  <text x="430" y="120" font-size="10" fill="#64748b" transform="rotate(-18, 430, 120)">observe</text>

  <!-- Arrow from action box back to brain volume -->
  <path d="M560,370 L380,290" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow)"/>
  <text x="450" y="345" font-size="10" fill="#64748b" transform="rotate(25, 450, 345)">execute in volume</text>

  <!-- Episode termination note -->
  <rect x="40" y="510" width="820" height="38" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="534" text-anchor="middle" font-size="12" fill="#64748b">
    <tspan font-weight="600" fill="#475569">Episode terminates</tspan> when agent reaches within 3 voxels of target (success) or after 200 steps (timeout)
  </text>
</svg>
